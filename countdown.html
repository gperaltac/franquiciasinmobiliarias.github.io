<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronómetro GO-LIVE v1.0</title>
    <style>
        /* Estilos visuales modernos */
        body {
            background-color: #0d1117; /* Color oscuro estilo GitHub */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            border: 2px solid #30363d;
            padding: 40px;
            border-radius: 20px;
            background: linear-gradient(145deg, #161b22, #0d1117);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 1.5rem;
            color: #8b949e;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .highlight {
            color: #238636; /* Verde de éxito/estable */
            font-weight: bold;
        }

        #countdown {
            font-size: 3.5rem;
            font-weight: 800;
            font-family: 'Courier New', Courier, monospace;
            color: #58a6ff;
            text-shadow: 0 0 20px rgba(88, 166, 255, 0.3);
        }

        .labels {
            font-size: 1rem;
            color: #8b949e;
            margin-top: 10px;
        }

        /* Efecto de parpadeo suave */
        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Falta para el <span class="highlight">GO-LIVE: Versión Estable (v1.0)</span></h1>
        <div id="countdown" class="pulse">Cargando...</div>
        <div class="labels">Días : Horas : Minutos : Segundos</div>
    </div>

    <script>
        // Configurar la fecha objetivo: 22 de Junio de 2026 00:00:00
        const countDownDate = new Date("Jun 22, 2026 00:00:00").getTime();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            // Cálculos de tiempo
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Mostrar el resultado en el elemento con id="countdown"
            document.getElementById("countdown").innerHTML = 
                days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

            // Si la cuenta regresiva termina
            if (distance < 0) {
                clearInterval(x);
                document.getElementById("countdown").innerHTML = "¡SISTEMA ONLINE!";
                document.getElementById("countdown").style.color = "#238636";
            }
        }, 1000);
    </script>

</body>
</html>
